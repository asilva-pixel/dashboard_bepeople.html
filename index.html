<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · bepeople</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }

header { background: #fff; border-bottom: 1px solid #e5e4df; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.logo span { color: #2563eb; }
.header-right { display: flex; align-items: center; gap: 12px; }
.sync-time { font-size: 12px; color: #888; }
.btn { font-size: 12px; padding: 6px 14px; border: 1px solid #d1d0cb; border-radius: 6px; background: #fff; cursor: pointer; color: #1a1a18; }
.btn:hover { background: #f5f4f0; }

.container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
.kpi { background: #fff; border: 1px solid #e5e4df; border-radius: 10px; padding: 16px 18px; }
.kpi-n { font-size: 28px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
.kpi-l { font-size: 12px; color: #888; }
.kpi-n.green { color: #3b6d11; }
.kpi-n.red   { color: #a32d2d; }
.kpi-n.amber { color: #854f0b; }
.kpi-n.blue  { color: #185fa5; }

.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.25rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e4df; margin-bottom: 1.5rem; }
.tab { padding: 8px 20px; font-size: 13px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #1a1a18; font-weight: 500; border-bottom-color: #2563eb; }

.filters { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.filters label { font-size: 12px; color: #888; }
.filters select { font-size: 12px; padding: 6px 10px; border: 1px solid #d1d0cb; border-radius: 6px; background: #fff; color: #1a1a18; cursor: pointer; }

.group-card { background: #fff; border: 1px solid #e5e4df; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
.group-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
.group-head:hover { background: #fafaf8; }
.group-name { font-size: 14px; font-weight: 600; }
.group-meta { font-size: 12px; color: #888; }
.chevron { font-size: 18px; color: #aaa; transition: transform 0.2s; display: inline-block; }
.chevron.open { transform: rotate(180deg); }
.group-body { padding: 0 18px 16px; border-top: 1px solid #f0efe9; display: none; }
.group-body.open { display: block; }

.prog-wrap { margin: 12px 0 16px; }
.prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 5px; }
.prog-bar { display: flex; height: 7px; border-radius: 4px; overflow: hidden; gap: 2px; background: #f0efe9; }
.prog-seg { height: 100%; border-radius: 3px; }

.alert-box { display: flex; align-items: center; gap: 6px; background: #fef3c7; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #854f0b; margin-bottom: 12px; }

.proyecto-label { font-size: 12px; font-weight: 600; color: #555; margin: 14px 0 6px; display: flex; justify-content: space-between; }
.proyecto-label span { font-weight: 400; color: #aaa; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; font-size: 11px; font-weight: 500; color: #aaa; padding: 5px 8px 5px 0; border-bottom: 1px solid #f0efe9; }
td { padding: 8px 8px 8px 0; border-bottom: 1px solid #f7f6f2; color: #1a1a18; vertical-align: middle; }
tr:last-child td { border-bottom: none; }

.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.b-green  { background: #eaf3de; color: #3b6d11; }
.b-blue   { background: #e6f1fb; color: #185fa5; }
.b-amber  { background: #faeeda; color: #854f0b; }
.b-gray   { background: #f1efe8; color: #5f5e5a; }
.b-purple { background: #eeedfe; color: #534ab7; }
.b-red    { background: #fcebeb; color: #a32d2d; }

.consult-section { margin-top: 16px; border-top: 1px solid #f0efe9; padding-top: 12px; }
.consult-title { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.consult-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: #e6f1fb; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #185fa5; flex-shrink: 0; }
.consult-name { font-size: 12px; font-weight: 500; min-width: 110px; }
.mini-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.mini-pill { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #666; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.urgente { font-size: 10px; color: #a32d2d; margin-left: 4px; }
.empty { text-align: center; padding: 3rem; color: #aaa; font-size: 13px; }
.loading { text-align: center; padding: 4rem; color: #888; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo">be<span>people</span> &middot; proyectos</div>
  <div class="header-right">
    <span class="sync-time" id="syncTime">Cargando...</span>
    <button class="btn" onclick="loadData()">&#8635; Actualizar</button>
  </div>
</header>

<div class="container">

  <div class="kpi-row" id="kpiRow">
    <div class="kpi"><div class="kpi-n">—</div><div class="kpi-l">Cargando...</div></div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#639922"></span>Completado</span>
    <span class="legend-item"><span class="legend-dot" style="background:#3266ad"></span>En curso</span>
    <span class="legend-item"><span class="legend-dot" style="background:#e24b4a"></span>Vencido</span>
    <span class="legend-item"><span class="legend-dot" style="background:#ef9f27"></span>Pendiente / No iniciado</span>
    <span class="legend-item"><span class="legend-dot" style="background:#7f77dd"></span>Postergado</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('rs', this)">Por razón social</button>
    <button class="tab" onclick="switchTab('cl', this)">Por cliente</button>
  </div>

  <div class="filters">
    <label>Filtrar:</label>
    <select id="filterStatus" onchange="render()">
      <option value="">Todos los estados</option>
      <option>Completado</option>
      <option>En curso</option>
      <option>Pendiente</option>
      <option>No iniciado</option>
      <option>Postergado</option>
      <option>Vencido</option>
    </select>
    <select id="filterConsultor" onchange="render()">
      <option value="">Todos los consultores</option>
    </select>
  </div>

  <div id="mainView"><div class="loading">Cargando datos desde Google Sheets...</div></div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStMSYlUoFxXjo45S6V0mpY33myKEfN3wcSbnfk1YjqapgMEOxItcpwm66RzDqVu2PndatX6HVjsPP-/pub?gid=0&single=true&output=csv";

let allData = [];
let currentTab = 'rs';

const STATUS_COLORS = {
  'Completado':  '#639922',
  'En curso':    '#3266ad',
  'Vencido':     '#e24b4a',
  'Pendiente':   '#ef9f27',
  'No iniciado': '#ef9f27',
  'Postergado':  '#7f77dd'
};

async function loadData() {
  document.getElementById('syncTime').textContent = 'Actualizando...';
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    allData = parseCSV(text);
    document.getElementById('syncTime').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
    populateFilters();
    renderKPIs();
    render();
  } catch(e) {
    document.getElementById('syncTime').textContent = 'Error al cargar';
    document.getElementById('mainView').innerHTML = '<div class="empty">No se pudo conectar con Google Sheets.<br>Verifica que el archivo esté publicado.</div>';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase().replace(/\s+/g,'_'));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').replace(/"/g,'').trim(); });
    return obj;
  }).filter(r => r.tarea && r.tarea.length > 0);
}

function isVencido(row) {
  if (!row.fecha_termino) return false;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const f = new Date(row.fecha_termino);
  return f < hoy && row.estatus !== 'Completado';
}

function getStatus(row) {
  if (isVencido(row)) return 'Vencido';
  return row.estatus || 'No iniciado';
}

function daysUntil(fechaStr) {
  if (!fechaStr) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const f = new Date(fechaStr);
  return Math.round((f - hoy) / 86400000);
}

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'2-digit' });
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function statusBadge(s) {
  const map = { 'Completado':'b-green','En curso':'b-blue','Pendiente':'b-amber','No iniciado':'b-gray','Postergado':'b-purple','Vencido':'b-red' };
  return '<span class="badge ' + (map[s] || 'b-gray') + '">' + (s || '—') + '</span>';
}

function populateFilters() {
  const consultores = [...new Set(allData.map(r => r.responsable).filter(Boolean))].sort();
  const sel = document.getElementById('filterConsultor');
  sel.innerHTML = '<option value="">Todos los consultores</option>' + consultores.map(c => '<option>' + c + '</option>').join('');
}

function renderKPIs() {
  const total = allData.length;
  const comp  = allData.filter(r => r.estatus === 'Completado').length;
  const venc  = allData.filter(r => isVencido(r)).length;
  const prox  = allData.filter(r => { const d = daysUntil(r.fecha_termino); return d !== null && d >= 0 && d <= 3 && r.estatus !== 'Completado'; }).length;
  const pct   = total ? Math.round(comp / total * 100) : 0;
  document.getElementById('kpiRow').innerHTML =
    '<div class="kpi"><div class="kpi-n">'          + total + '</div><div class="kpi-l">Tareas totales</div></div>' +
    '<div class="kpi"><div class="kpi-n green">'    + comp  + '</div><div class="kpi-l">Completadas (' + pct + '%)</div></div>' +
    '<div class="kpi"><div class="kpi-n red">'      + venc  + '</div><div class="kpi-l">Vencidas</div></div>' +
    '<div class="kpi"><div class="kpi-n amber">'    + prox  + '</div><div class="kpi-l">Vencen en 3 días</div></div>';
}

function filteredData() {
  const fs = document.getElementById('filterStatus').value;
  const fc = document.getElementById('filterConsultor').value;
  return allData.filter(r => {
    if (fs && getStatus(r) !== fs) return false;
    if (fc && r.responsable !== fc) return false;
    return true;
  });
}

function render() {
  renderKPIs();
  const data = filteredData();
  const key  = currentTab === 'rs' ? 'razon_social' : 'cliente';
  const groups = {};
  data.forEach(r => {
    const g = r[key] || 'Sin asignar';
    if (!groups[g]) groups[g] = [];
    groups[g].push(r);
  });
  const view = document.getElementById('mainView');
  if (Object.keys(groups).length === 0) {
    view.innerHTML = '<div class="empty">Sin datos para los filtros seleccionados.</div>';
    return;
  }
  view.innerHTML = Object.entries(groups).map(([name, rows], idx) => buildGroup(name, rows, idx)).join('');
}

function buildGroup(name, rows, idx) {
  const counts = {};
  rows.forEach(r => { const s = getStatus(r); counts[s] = (counts[s]||0)+1; });
  const total = rows.length;
  const comp  = counts['Completado'] || 0;

  const progSegs = Object.entries(counts).map(([s,n]) =>
    '<div class="prog-seg" style="width:' + Math.round(n/total*100) + '%;background:' + (STATUS_COLORS[s]||'#aaa') + ';"></div>'
  ).join('');

  const proximas = rows.filter(r => { const d = daysUntil(r.fecha_termino); return d !== null && d >= 0 && d <= 3 && r.estatus !== 'Completado'; });
  const alertHtml = proximas.length
    ? '<div class="alert-box">&#9888;&#65039; ' + proximas.length + ' tarea(s) vencen en los próximos 3 días hábiles.</div>'
    : '';

  const metaStr = Object.entries(counts).map(([s,n]) => n + ' ' + s.toLowerCase()).join(' · ');

  const proyectos = [...new Set(rows.map(r => r.proyecto))];
  const proyHtml = proyectos.map(proy => {
    const ptareas = rows.filter(r => r.proyecto === proy);
    const pc = ptareas.filter(r => r.estatus === 'Completado').length;
    const trows = ptareas.map(r => {
      const s   = getStatus(r);
      const d   = daysUntil(r.fecha_termino);
      const urg = (d !== null && d >= 0 && d <= 3 && s !== 'Completado') ? '<span class="urgente">&#9888; ' + d + 'd</span>' : '';
      return '<tr><td>' + (r.tarea||'—') + '</td><td>' + (r.responsable||'—') + '</td><td>' + formatDate(r.fecha_termino) + urg + '</td><td>' + statusBadge(s) + '</td></tr>';
    }).join('');
    return '<div class="proyecto-label">' + proy + '<span>' + pc + '/' + ptareas.length + ' completadas</span></div>' +
      '<table><thead><tr><th>Tarea</th><th>Responsable</th><th>Fecha término</th><th>Estado</th></tr></thead><tbody>' + trows + '</tbody></table>';
  }).join('');

  const consultores = [...new Set(rows.map(r => r.responsable).filter(Boolean))];
  const consultHtml = consultores.map(c => {
    const ct    = rows.filter(r => r.responsable === c);
    const cComp = ct.filter(r => r.estatus === 'Completado').length;
    const cVenc = ct.filter(r => getStatus(r) === 'Vencido').length;
    const cPend = ct.filter(r => ['Pendiente','No iniciado'].includes(getStatus(r))).length;
    const cPost = ct.filter(r => getStatus(r) === 'Postergado').length;
    const cCurs = ct.filter(r => getStatus(r) === 'En curso').length;
    let pills = '';
    if (cComp) pills += '<span class="mini-pill"><span class="dot" style="background:#639922"></span>' + cComp + ' compl.</span>';
    if (cCurs) pills += '<span class="mini-pill"><span class="dot" style="background:#3266ad"></span>' + cCurs + ' en curso</span>';
    if (cVenc) pills += '<span class="mini-pill"><span class="dot" style="background:#e24b4a"></span>' + cVenc + ' vencida(s)</span>';
    if (cPend) pills += '<span class="mini-pill"><span class="dot" style="background:#ef9f27"></span>' + cPend + ' pend.</span>';
    if (cPost) pills += '<span class="mini-pill"><span class="dot" style="background:#7f77dd"></span>' + cPost + ' posterg.</span>';
    return '<div class="consult-row"><div class="avatar">' + initials(c) + '</div><div class="consult-name">' + c + '</div><div class="mini-pills">' + pills + '</div></div>';
  }).join('');

  const bodyId = 'body-' + idx;
  return '<div class="group-card">' +
    '<div class="group-head" onclick="toggleGroup(\'' + bodyId + '\')">' +
    '<div class="group-name">' + name + '</div>' +
    '<div style="display:flex;align-items:center;gap:12px;">' +
    '<div class="group-meta">' + total + ' tareas &middot; ' + metaStr + '</div>' +
    '<span class="chevron" id="chev-' + bodyId + '">&#8964;</span>' +
    '</div></div>' +
    '<div class="group-body" id="' + bodyId + '">' +
    alertHtml +
    '<div class="prog-wrap"><div class="prog-labels"><span>Avance general</span><span>' + comp + '/' + total + '</span></div>' +
    '<div class="prog-bar">' + progSegs + '</div></div>' +
    proyHtml +
    '<div class="consult-section"><div class="consult-title">Avance por consultor</div>' + consultHtml + '</div>' +
    '</div></div>';
}

function toggleGroup(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('chev-' + id).classList.toggle('open');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

loadData();
</script>
</body>
</html>
